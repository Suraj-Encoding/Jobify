# Server Configuration
server.port=${PORT:3001}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/jobify}
spring.data.mongodb.database=${DB_NAME:jobify}

# Application Configuration
app.server.uri=${SERVER_URI:http://localhost:3001}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# CORS Configuration
app.cors.allowed-origins=*
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Content-Type

# Logging Configuration
logging.level.root=INFO
logging.level.com.jobify=DEBUG

# Timezone Configuration
app.timezone=Asia/Kolkata
